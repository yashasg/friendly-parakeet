name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: Linux
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          vcpkg: true

      - name: Install SDL2 build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev libxfixes-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Restore vcpkg packages
        run: vcpkg install --triplet x64-linux

      - name: Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake
          cmake --build build

      - name: Run tests
        id: run-tests
        run: |
          cd build
          ctest --output-on-failure --output-junit test-results.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapeshifter-linux
          path: build/shapeshifter

      - name: Convert test results to CTRF
        if: always()
        run: npx junit-to-ctrf build/test-results.xml -o ctrf/results.json

      - name: Report test results
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
