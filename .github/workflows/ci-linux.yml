name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build-native:
    name: Build (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      CC: clang-20
      CXX: clang++-20
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js for native tooling tests
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Clang 20 + system dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/llvm-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-20.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-20 \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libpulse-dev \
            xvfb

      - name: Setup vcpkg
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error title=Missing vcpkg installation::VCPKG_INSTALLATION_ROOT is not set on this runner, so VCPKG_ROOT cannot be exported."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Cache CMake build directory
        uses: actions/cache@v5
        with:
          path: build
          key: cmake-linux-clang20-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            cmake-linux-clang20-v2-

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Install Python tool test dependencies
        run: |
          PYTHON_TOOL_TEST_EXE="$(grep '^_Python3_EXECUTABLE:INTERNAL=' build/CMakeCache.txt | cut -d= -f2-)"
          "$PYTHON_TOOL_TEST_EXE" -m pip install --break-system-packages -r tools/python-tool-test-requirements.txt || \
          "$PYTHON_TOOL_TEST_EXE" -m pip install -r tools/python-tool-test-requirements.txt

      - name: Validate raylib overlay audio-disabled stub path
        run: cmake -P tools/validate_raylib_overlay_audio_stub_path.cmake

      - name: Run tests
        if: always()
        id: run-tests
        run: |
          mkdir -p build/ci
          ctest --test-dir build -N \
            | sed -nE 's/^ *Test *#[0-9]+: (.*)$/\1/p' \
            | grep -Ev '^Bench:|^(python_tool_tests|loop2_content_gates_strict|validate_loop1_diagnostics|validate_difficulty_ramp|validate_offset_semantics|validate_max_beat_gap|validate_no_simultaneous_shape_gates|validate_required_cross_lane_jump_time|check_shape_change_gap|check_enum_allowlist|beatmap_editor_node_tests|service_worker_cache_policy_node_tests|startup_shutdown_smoke)$' \
            | sort -u > build/ci/ctest-nonbench-catch.txt
          ./build/shapeshifter_tests --list-tests "~[bench]" --verbosity quiet \
            | sort -u > build/ci/catch-nonbench.txt
          diff -u build/ci/ctest-nonbench-catch.txt build/ci/catch-nonbench.txt
          ./build/shapeshifter_tests "~[bench]"
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            ctest --test-dir build --output-on-failure -R "^startup_shutdown_smoke$"
          ctest --test-dir build --output-on-failure -R "^(python_tool_tests|loop2_content_gates_strict|validate_loop1_diagnostics|validate_difficulty_ramp|validate_offset_semantics|validate_max_beat_gap|validate_no_simultaneous_shape_gates|validate_required_cross_lane_jump_time|check_shape_change_gap|check_enum_allowlist|beatmap_editor_node_tests|service_worker_cache_policy_node_tests)$"

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-linux
          path: |
            build/shapeshifter
            build/content
          if-no-files-found: error

      - name: Upload CTRF report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v5
        with:
          name: ctrf-report-linux
          path: build/ctrf-report.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'build/ctrf-report.json'
          title: 'Test Results (Linux)'
          pull-request-report: true
          update-comment: true
          comment-tag: ctrf-linux
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
