name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: Linux
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          vcpkg: true

      - name: Install SDL2 system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev libxfixes-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Build
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build build -j $(nproc)

      - name: Run tests
        if: always()
        id: run-tests
        run: ctest --test-dir build --output-on-failure --output-junit test-results.xml

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shapeshifter-linux
          path: build/shapeshifter

      - name: Convert test results to CTRF
        if: always() && steps.run-tests.outcome != 'skipped'
        run: |
          mkdir -p ctrf
          npx junit-to-ctrf build/test-results.xml -o ctrf/results.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
