name: CI (Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          vcpkg: true

      - name: Export VCPKG_ROOT
        run: echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
        shell: bash

      - name: Cache CMake build directory
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: build
          key: cmake-linux-clang-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
          restore-keys: |
            cmake-linux-clang-

      - name: Install SDL2 system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev libxfixes-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Run tests
        if: always()
        id: run-tests
        run: ./build/shapeshifter_tests --benchmark-samples 1

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shapeshifter-linux
          path: build/shapeshifter

      - name: Upload CTRF report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: ctrf-report-linux
          path: ctrf-report.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf-report.json'
          pull-request-report: true
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
