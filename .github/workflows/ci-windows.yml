name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Windows)
    runs-on: Windows
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup C++ toolchain
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          vcpkg: true

      - name: Restore vcpkg packages
        run: vcpkg install --triplet x64-windows

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Run tests
        id: run-tests
        run: |
          cd build
          ctest --output-on-failure --output-junit test-results.xml -C Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapeshifter-windows
          path: build/Release/shapeshifter.exe

      - name: Convert test results to CTRF
        if: always()
        run: npx junit-to-ctrf build/test-results.xml -o ctrf/results.json

      - name: Report test results
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
