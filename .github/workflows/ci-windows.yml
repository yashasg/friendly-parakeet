name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "content/**"
      - "tools/**"
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error::VCPKG_INSTALLATION_ROOT is not set on this runner. Cannot configure VCPKG_ROOT for the Windows build."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install LLVM 20
        shell: powershell
        run: |
          choco install llvm -y --no-progress
          $clangVer = (clang --version) -join " "
          Write-Host "Clang: $clangVer"
          if ($clangVer -notmatch "clang version 20\.") {
            Write-Error "Expected Clang 20.x but got: $clangVer"
            exit 1
          }

      - name: Cache CMake build directory
        uses: actions/cache@v5
        with:
          path: build
          key: cmake-windows-clang20-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
          restore-keys: |
            cmake-windows-clang20-v2-

      - name: Build
        run: ./build.sh
        shell: bash

      - name: Run tests
        if: always()
        id: run-tests
        run: ./build/shapeshifter_tests.exe "~[bench]"
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-windows
          path: build/shapeshifter.exe

      - name: Upload CTRF report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v5
        with:
          name: ctrf-report-windows
          path: ctrf-report.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf-report.json'
          title: 'Test Results (Windows)'
          pull-request-report: true
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
