name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "content/**"
      - "tools/**"
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install LLVM 20
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
          env: true

      - name: Set Clang as compiler
        shell: bash
        run: |
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Setup vcpkg
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Cache CMake build directory
        uses: actions/cache@v5
        with:
          path: build
          key: cmake-windows-clang20-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
          restore-keys: |
            cmake-windows-clang20-static-md-

      - name: Build
        run: ./build.sh
        shell: bash

      - name: Run tests
        if: always()
        id: run-tests
        run: ./build/shapeshifter_tests.exe "~[bench]"
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-windows
          path: build/shapeshifter.exe

      - name: Upload CTRF report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v5
        with:
          name: ctrf-report-windows
          path: ctrf-report.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf-report.json'
          title: 'Test Results (Windows)'
          pull-request-report: true
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
