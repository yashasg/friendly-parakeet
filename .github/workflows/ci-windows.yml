name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build:
    name: Build (Windows, Clang)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js for native tooling tests
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error::VCPKG_INSTALLATION_ROOT is not set on this runner. Cannot configure VCPKG_ROOT for the Windows build."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install LLVM 20
        shell: powershell
        run: |
          choco install llvm -y --no-progress
          $clangVer = (clang --version) -join " "
          Write-Host "Clang: $clangVer"
          if ($clangVer -notmatch "clang version 20\.") {
            Write-Error "Expected Clang 20.x but got: $clangVer"
            exit 1
          }

      - name: Cache CMake build directory
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: build
          key: cmake-windows-clang20-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
          restore-keys: |
            cmake-windows-clang20-v2-

      - name: Build
        run: ./build.sh
        shell: bash

      - name: Install Python tool test dependencies
        shell: bash
        run: |
          PYTHON_TOOL_TEST_EXE="$(grep '^_Python3_EXECUTABLE:INTERNAL=' build/CMakeCache.txt | cut -d= -f2-)"
          "$PYTHON_TOOL_TEST_EXE" -m pip install --break-system-packages -r tools/python-tool-test-requirements.txt || \
          "$PYTHON_TOOL_TEST_EXE" -m pip install -r tools/python-tool-test-requirements.txt

      - name: Run tests
        if: always()
        id: run-tests
        run: |
          mkdir -p build/ci
          ctest --test-dir build -N \
            | sed -nE 's/^ *Test *#[0-9]+: (.*)$/\1/p' \
            | grep -Ev '^Bench:|^(python_tool_tests|loop2_content_gates_strict|validate_difficulty_ramp|validate_max_beat_gap|validate_no_simultaneous_shape_gates|beatmap_editor_node_tests|startup_shutdown_smoke)$' \
            | tr -d '\r' \
            | sort -u > build/ci/ctest-nonbench-catch.txt
          ./build/shapeshifter_tests.exe --list-tests "~[bench]" --verbosity quiet \
            | tr -d '\r' \
            | sort -u > build/ci/catch-nonbench.txt
          diff -u build/ci/ctest-nonbench-catch.txt build/ci/catch-nonbench.txt
          ./build/shapeshifter_tests.exe "~[bench]"
          ctest --test-dir build --output-on-failure -R "^startup_shutdown_smoke$"
          ctest --test-dir build --output-on-failure -R "^(python_tool_tests|loop2_content_gates_strict|validate_difficulty_ramp|validate_max_beat_gap|validate_no_simultaneous_shape_gates|beatmap_editor_node_tests)$"
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-windows
          path: build/shapeshifter.exe

      - name: Upload CTRF report
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: actions/upload-artifact@v5
        with:
          name: ctrf-report-windows
          path: ctrf-report.json

      - name: Report test results
        if: always() && steps.run-tests.outcome != 'skipped'
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf-report.json'
          title: 'Test Results (Windows)'
          pull-request-report: true
          update-comment: true
          comment-tag: ctrf-windows
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-msvc:
    name: Build (Windows, MSVC)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup Node.js for native tooling tests
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error::VCPKG_INSTALLATION_ROOT is not set on this runner. Cannot configure VCPKG_ROOT for the Windows build."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build-msvc -S . -G "Visual Studio 17 2022" -A x64 -Wno-dev ^
            "-DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake"
        shell: cmd

      - name: Build
        run: cmake --build build-msvc --config Release
        shell: cmd
