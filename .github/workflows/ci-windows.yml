name: CI (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Windows)
    runs-on: Windows
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-cmake

      - name: Build
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run tests
        id: run-tests
        run: |
          cd build
          ctest --output-on-failure --output-junit test-results.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shapeshifter-windows
          path: build/shapeshifter.exe

      - name: Convert test results to CTRF
        if: always()
        run: npx junit-to-ctrf build/test-results.xml -o ctrf/results.json
        shell: cmd

      - name: Report test results
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'ctrf/*.json'
          pull-request-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
