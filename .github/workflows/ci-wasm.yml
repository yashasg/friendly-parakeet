name: CI (WebAssembly)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "content/**"
      - "tools/**"
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build-web:
    name: Build (WebAssembly)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Setup vcpkg
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error title=Missing vcpkg installation::VCPKG_INSTALLATION_ROOT is not set on this runner, so VCPKG_ROOT cannot be exported."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Cache build directory
        uses: actions/cache@v5
        with:
          path: build-web
          key: cmake-web-emscripten-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json') }}
          restore-keys: |
            cmake-web-emscripten-v2-

      - name: Build (Emscripten)
        run: |
          emcmake cmake -B build-web -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev \
            "-DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=$(pwd)/vcpkg-overlay" \
            "-DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${EMSDK}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake"
          cmake --build build-web

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-web
          path: |
            build-web/index.html
            build-web/index.js
            build-web/index.wasm
            build-web/index.data
            build-web/sw.js

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: shapeshifter-web
          path: site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
