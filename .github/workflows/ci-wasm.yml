name: CI (WebAssembly)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev, preview, insider]
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - "tools/**"
      - "design-docs/**"
      - "*.md"
      - "*.log"

jobs:
  build-web:
    name: Build (WebAssembly)
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.3
          actions-cache-folder: emsdk-cache

      - name: Setup vcpkg
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error title=Missing vcpkg installation::VCPKG_INSTALLATION_ROOT is not set on this runner, so VCPKG_ROOT cannot be exported."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Cache build directory
        uses: actions/cache@v5
        with:
          path: build-web
          # v3: unity builds enabled — old non-unity object files are incompatible
          key: cmake-web-emscripten-v3-${{ hashFiles('CMakeLists.txt', 'vcpkg.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            cmake-web-emscripten-v3-

      - name: Build (Emscripten)
        run: |
          emcmake cmake -B build-web -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev \
            "-DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            "-DVCPKG_OVERLAY_PORTS=$(pwd)/vcpkg-overlay" \
            "-DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=${EMSDK}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
            -DVCPKG_TARGET_TRIPLET=wasm32-emscripten
          cmake --build build-web -- -j$(nproc)

      - name: Verify WASM async support flag
        run: |
          LINK_FILE="build-web/CMakeFiles/shapeshifter.dir/link.txt"
          if [ ! -f "$LINK_FILE" ]; then
            echo "::error title=Missing linker command::$LINK_FILE not found"
            exit 1
          fi
          if ! grep -q -- "-sASYNCIFY" "$LINK_FILE"; then
            echo "::error title=Missing async support flag::shapeshifter link flags must include -sASYNCIFY for emscripten_sleep support"
            exit 1
          fi
          echo "Verified -sASYNCIFY is present in shapeshifter link flags"

      - name: Run WASM tests (via CTest + Node)
        run: |
          cd build-web
          ctest --verbose --output-on-failure

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: shapeshifter-web
          path: |
            build-web/index.html
            build-web/index.js
            build-web/index.wasm
            build-web/index.data
            build-web/sw.js

  deploy-main:
    name: Deploy to GitHub Pages (main)
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Checkout source (main)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: _src

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: shapeshifter-web
          path: _new_build

      - name: Validate build artifacts
        run: |
          for file in index.html index.js index.wasm index.data sw.js; do
            if [ ! -f "_new_build/$file" ]; then
              echo "::error title=Missing artifact::_new_build/$file not found"
              exit 1
            fi
            if [ ! -s "_new_build/$file" ]; then
              echo "::error title=Empty artifact::_new_build/$file is empty"
              exit 1
            fi
          done
          echo "All build artifacts validated"

      - name: Deploy to root (preserving PR previews)
        run: |
          # Remove old root files but keep subdirectories (PR previews)
          find . -maxdepth 1 -type f ! -name '.nojekyll' ! -name '.git' -delete
          # Move new build files to root
          cp -f _new_build/* .
          # Deploy static level editor to /level-editor
          rm -rf level-editor
          mkdir -p level-editor/js level-editor/css
          cp -f _src/tools/beatmap-editor/index.html level-editor/
          cp -f _src/tools/beatmap-editor/js/*.js level-editor/js/
          cp -f _src/tools/beatmap-editor/css/*.css level-editor/css/
          for file in index.html index.js index.wasm index.data sw.js; do
            if [ ! -s "$file" ]; then
              echo "::error title=Invalid deployed artifact::$file missing or empty after deploy copy"
              exit 1
            fi
          done
          for file in \
            level-editor/index.html \
            level-editor/js/main.js \
            level-editor/css/editor.css; do
            if [ ! -s "$file" ]; then
              echo "::error title=Invalid level editor artifact::$file missing or empty after deploy copy"
              exit 1
            fi
          done
          rm -rf _new_build
          rm -rf _src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy main to root"
          git push

  deploy-pr:
    name: Deploy PR Preview
    needs: build-web
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: shapeshifter-web
          path: _new_build

      - name: Validate build artifacts
        run: |
          for file in index.html index.js index.wasm index.data sw.js; do
            if [ ! -f "_new_build/$file" ]; then
              echo "::error title=Missing artifact::_new_build/$file not found"
              exit 1
            fi
            if [ ! -s "_new_build/$file" ]; then
              echo "::error title=Empty artifact::_new_build/$file is empty"
              exit 1
            fi
          done
          echo "All build artifacts validated"

      - name: Deploy to branch subdirectory
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # Sanitize branch name: replace / with -
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '/' '-')
          rm -rf "$SAFE_BRANCH"
          mkdir -p "$SAFE_BRANCH"
          cp -f _new_build/* "$SAFE_BRANCH/"
          for file in index.html index.js index.wasm index.data sw.js; do
            if [ ! -s "$SAFE_BRANCH/$file" ]; then
              echo "::error title=Invalid preview artifact::$SAFE_BRANCH/$file missing or empty after deploy copy"
              exit 1
            fi
          done
          rm -rf _new_build
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "PR preview: $SAFE_BRANCH"
          git push

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const branch = process.env.BRANCH_NAME || context.payload.pull_request.head.ref;
            const safeBranch = branch.replace(/\//g, '-');
            const url = `https://yashasg.github.io/friendly-parakeet/${safeBranch}/`;
            const body = `🎮 **WASM Preview:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🎮 **WASM Preview:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          BRANCH_NAME: ${{ github.head_ref }}

  cleanup-pr:
    name: Cleanup PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview subdirectory
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '/' '-')
          if [ -d "$SAFE_BRANCH" ]; then
            rm -rf "$SAFE_BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Remove PR preview: $SAFE_BRANCH"
            git push
          fi
