name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;default,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      CC: clang-20
      CXX: clang++-20
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Clang 20 + system dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/llvm-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-20.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-20 \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libpulse-dev \
            catch2

      - name: Setup vcpkg
        run: |
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "::error title=Missing vcpkg installation::VCPKG_INSTALLATION_ROOT is not set on this runner, so VCPKG_ROOT cannot be exported."
            exit 1
          fi
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Cache CMake build directory
        uses: actions/cache@v5
        with:
          path: build
          key: cmake-linux-clang20-v2-${{ hashFiles('CMakeLists.txt', 'vcpkg.json', 'vcpkg-overlay/**') }}
          restore-keys: |
            cmake-linux-clang20-v2-

      - name: Configure and build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Run tests
        id: run-tests
        run: ./build/shapeshifter_tests "~[bench]"

      - name: Validate preview artifacts
        run: |
          if [ ! -f build/shapeshifter ]; then
            echo "::error title=Missing preview artifact::build/shapeshifter not found"
            exit 1
          fi
          if [ ! -s build/shapeshifter ]; then
            echo "::error title=Empty preview artifact::build/shapeshifter is empty"
            exit 1
          fi
          echo "Preview artifact validation passed: build/shapeshifter"
